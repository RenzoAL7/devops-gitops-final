apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 87.10.1
    helm:
      skipCrds: false
      values:  |
        crds:
          enabled: true
          upgradeJob:
            enabled: true

        fullnameOverride: monitoring-stack

        alertmanager:
          enabled: false

        kubeEtcd:
          enabled: false

        kubeControllerManager:
          enabled: false

        kubeScheduler:
          enabled: false

        kubeProxy:
          enabled: false

        grafana:
          adminPassword: admin12345
          service:
            type: ClusterIP
          defaultDashboardsEnabled: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 384Mi

        prometheus:
          service:
            type: ClusterIP
          prometheusSpec:
            replicas: 1
            retention: 3d
            scrapeInterval: 30s
            walCompression: true
            # Keep Prometheus ephemeral for the course demo and K3s single-node.
            # This avoids PVC-related stalls while Argo CD waits for health.
            storageSpec:
              emptyDir:
                sizeLimit: 5Gi
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: 500m
                memory: 1024Mi

        kube-state-metrics:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 150m
              memory: 192Mi

        prometheus-node-exporter:
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 150m
              memory: 96Mi

        prometheusOperator:
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
